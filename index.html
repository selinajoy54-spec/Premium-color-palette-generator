<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Color Palette Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🎨 Color Palette Generator</h1>
        <p class="subtitle">Click Generate to create beautiful color palettes</p>

        <button id="generateBtn" onclick="generatePalette()">
            Generate Colors
        </button>

        <div class="palette" id="palette"></div>

    </div>

    <div id="toast" class="toast">
        Color Copied!
    </div>

    <script src="script.js"></script>

</body>
</html>
